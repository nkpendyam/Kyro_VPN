name: Kyro VPN CI/CD

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. Build and Test Go Backend (Coordinator & Daemon)
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Test Coordinator
        run: cd coordinator && go test ./...
      - name: Test Daemon
        run: cd node-daemon && go test ./...

  # 2. Build Flutter Android APK
  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: 'stable'
      - name: Install dependencies
        run: cd client && flutter pub get
      - name: Build APK
        run: cd client && flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kyro-vpn-android
          path: client/build/app/outputs/flutter-apk/app-release.apk

  # 3. Build & Lint Web Dashboard
  dashboard-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Dependencies
        run: cd kyro-dashboard && npm install
      - name: Build Dashboard
        run: cd kyro-dashboard && npm run build

  # 4. Create GitHub Release (Tags only)
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [backend-test, android-build, dashboard-check]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: kyro-vpn-android
          path: release-assets
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/app-release.apk
          name: Kyro VPN ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
